<!-- @dsCard group="Colors" viewport="700x180" name="Slate Neutrals" subtitle="Chrome, surfaces, text, borders — the full slate scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); }
  .wrap { display: grid; grid-template-columns: repeat(11, 1fr); padding: 18px; gap: 0; }
  .sw { height: 100px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 7px; box-sizing: border-box; }
  .sw:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
  .sw:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; border-right: 1px solid var(--slate-200); }
  .sw .name { font: var(--weight-semibold) var(--text-2xs)/1 var(--font-sans); }
  .sw .hex { font: 9px/1.3 var(--font-mono); opacity: 0.8; margin-top: 2px; }
  .light { color: var(--white); }
  .dark { color: var(--slate-900); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw dark" style="background:var(--slate-50)"><span class="name">50</span><span class="hex">f8fafc</span></div>
    <div class="sw dark" style="background:var(--slate-100)"><span class="name">100</span><span class="hex">f1f5f9</span></div>
    <div class="sw dark" style="background:var(--slate-200)"><span class="name">200</span><span class="hex">e2e8f0</span></div>
    <div class="sw dark" style="background:var(--slate-300)"><span class="name">300</span><span class="hex">cbd5e1</span></div>
    <div class="sw dark" style="background:var(--slate-400)"><span class="name">400</span><span class="hex">94a3b8</span></div>
    <div class="sw light" style="background:var(--slate-500)"><span class="name">500</span><span class="hex">64748b</span></div>
    <div class="sw light" style="background:var(--slate-600)"><span class="name">600</span><span class="hex">475569</span></div>
    <div class="sw light" style="background:var(--slate-700)"><span class="name">700</span><span class="hex">334155</span></div>
    <div class="sw light" style="background:var(--slate-800)"><span class="name">800</span><span class="hex">1e293b</span></div>
    <div class="sw light" style="background:var(--slate-900)"><span class="name">900 · chrome</span><span class="hex">0f172a</span></div>
    <div class="sw light" style="background:var(--slate-950)"><span class="name">950</span><span class="hex">020617</span></div>
  </div>
</body>
</html>
