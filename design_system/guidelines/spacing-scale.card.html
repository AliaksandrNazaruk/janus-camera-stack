<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing Scale" subtitle="4px base grid — dense industrial rhythm" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-body); }
  .wrap { display: flex; align-items: flex-end; gap: 16px; padding: 22px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .bar { background: var(--blue-600); border-radius: var(--radius-xs); width: 22px; }
  .tok { font: var(--weight-regular) var(--text-2xs) var(--font-mono); color: var(--text-muted); }
  .px { font: var(--weight-semibold) var(--text-xs) var(--font-sans); color: var(--text-strong); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="bar" style="height:4px"></div><span class="px">4</span><span class="tok">1</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="px">8</span><span class="tok">2</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="px">12</span><span class="tok">3</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="px">16</span><span class="tok">4</span></div>
    <div class="item"><div class="bar" style="height:20px"></div><span class="px">20</span><span class="tok">5</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="px">24</span><span class="tok">6</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="px">32</span><span class="tok">8</span></div>
    <div class="item"><div class="bar" style="height:40px"></div><span class="px">40</span><span class="tok">10</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="px">48</span><span class="tok">12</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="px">64</span><span class="tok">16</span></div>
  </div>
</body>
</html>
