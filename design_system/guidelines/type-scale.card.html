<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="13px base — dense console set, from micro-label to hero metric" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface-card); color: var(--text-strong); }
  .wrap { padding: 18px 22px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--slate-100); }
  .row:last-child { border-bottom: 0; }
  .tok { width: 150px; flex: none; font: var(--weight-regular) var(--text-sm)/1 var(--font-mono); color: var(--text-muted); }
  .spec { color: var(--text-strong); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="tok">--text-4xl · 36</span><span class="spec" style="font-size:36px;font-weight:700;letter-spacing:-0.01em">3 / 4</span></div>
    <div class="row"><span class="tok">--text-2xl · 22</span><span class="spec" style="font-size:22px;font-weight:700">Command Center</span></div>
    <div class="row"><span class="tok">--text-lg · 16</span><span class="spec" style="font-size:16px;font-weight:600">Attention Required</span></div>
    <div class="row"><span class="tok">--text-md · 14</span><span class="spec" style="font-size:14px;font-weight:600">cam55 — remote producer</span></div>
    <div class="row"><span class="tok">--text-base · 13</span><span class="spec" style="font-size:13px">Restart this stream without touching Janus.</span></div>
    <div class="row"><span class="tok">--text-sm · 12</span><span class="spec" style="font-size:12px;font-family:var(--font-mono)">rtp_age 90ms · mp 2000 · port 5100</span></div>
    <div class="row"><span class="tok">--text-xs · 11</span><span class="spec" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted)">Last seen 8s ago</span></div>
  </div>
</body>
</html>
