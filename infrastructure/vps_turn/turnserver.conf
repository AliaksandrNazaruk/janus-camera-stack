# ─── coturn / TURN server config — TEMPLATE ─────────────────────────
# Hardened pattern. Edit placeholders before deploying:
#   <YOUR_TURN_PUBLIC_IP>   — replace in listening/relay/external-ip
#   <YOUR_REALM>            — replace in realm= line
#   __TURN_SHARED_SECRET__  — replace OR mount via systemd EnvironmentFile
# Then place at /etc/turnserver.conf and systemctl restart coturn.

# ── Listeners ───────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=443
# 5349 kept as alt for backward compat (may not bind with single IP)
alt-tls-listening-port=5349

listening-ip=<YOUR_TURN_PUBLIC_IP>
relay-ip=<YOUR_TURN_PUBLIC_IP>
external-ip=<YOUR_TURN_PUBLIC_IP>

# ── Authentication ──────────────────────────────────────────────────
realm=<YOUR_REALM>
fingerprint

# Ephemeral HMAC-SHA1 credentials (coturn REST API / use-auth-secret).
# ALL clients (browsers AND Janus server-side ICE) must use ephemeral
# credentials: username = "<unix_expiry>:<user>", password = Base64(HMAC-SHA1(username, secret)).
# NOTE: lt-cred-mech (static passwords) CANNOT coexist with use-auth-secret
# in coturn — static auth is silently ignored when use-auth-secret is active.
use-auth-secret
static-auth-secret=__TURN_SHARED_SECRET__

# Nonce lifetime — force re-auth every 600s
stale-nonce=600

# ── TLS ─────────────────────────────────────────────────────────────
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# Disable old/insecure TLS versions
no-tlsv1
no-tlsv1_1

# ── Relay port range ───────────────────────────────────────────────
min-port=49152
max-port=65535

# ── Security: deny relay to private/multicast networks ─────────────
no-multicast-peers

denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=240.0.0.0-255.255.255.255

# ── Rate limiting ──────────────────────────────────────────────────
user-quota=50
max-bps=3000000
bps-capacity=10000000

# ── Logging ────────────────────────────────────────────────────────
syslog
log-file=/var/log/coturn/turnserver.log
simple-log

# ── Misc ───────────────────────────────────────────────────────────
# Disallow peers on the server's own IP (loopback relay attack)
no-loopback-peers
