# Consolidated Janus service hardening (replaces disable-sandbox + secure-paths +
# ensure-streams + zzz-disable-ensure-streams).
[Service]
ProtectSystem=strict
ProtectHome=yes
PrivateTmp=yes
NoNewPrivileges=yes
ReadWritePaths=/opt/janus/etc/janus
ReadWritePaths=/opt/janus/etc/janus/streams.d
ReadWritePaths=/opt/janus/var
