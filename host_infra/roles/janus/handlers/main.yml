---
- name: systemd daemon-reload
  ansible.builtin.systemd:
    daemon_reload: yes

- name: restart janus
  ansible.builtin.systemd:
    name: "{{ janus_service_name }}"
    state: restarted
  # WARNING: restart janus = drop all WebRTC sessions для ВСЕХ камер.
  # Only triggered если config files реально изменились (notify handlers).
