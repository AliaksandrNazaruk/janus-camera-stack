# Consolidated Janus service hardening (replaces disable-sandbox + secure-paths +
# ensure-streams + zzz-disable-ensure-streams).
[Service]
ProtectSystem=strict
ProtectHome=yes
PrivateTmp=yes
NoNewPrivileges=yes
ReadWritePaths=/opt/janus/etc/janus
ReadWritePaths=/opt/janus/etc/janus/streams.d
ReadWritePaths=/opt/janus/var

# Resource ceiling — prevents memory leak от killing host. Current usage ~6MB.
# Session state может расти под load (WebRTC per-session buffers, mountpoint
# state). 512M даёт ~80× headroom. Если hit'нет — systemd OOM-kills + restart.
MemoryMax=512M
