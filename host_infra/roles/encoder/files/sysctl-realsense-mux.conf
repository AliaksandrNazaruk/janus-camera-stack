# Sysctl tuning для realsense-mux pipe buffers (Sprint X3 — depth/IR streams).
#
# Default fs.pipe-max-size = 1MB. realsense-mux opens 3 FIFOs (depth+ir1+ir2)
# and writes 640×480 frames atomically:
#   depth (RGB8) = 921,600 bytes per frame
#   ir1/ir2 (Y8) = 307,200 bytes per frame
#
# Без увеличения, depth FIFO buffer fits one frame max → any consumer stall
# causes partial writes (kernel doesn't guarantee atomicity for writes >
# PIPE_BUF=4KB), which permanently misaligns frame boundaries в the rawvideo
# stream → tiled mosaic в decoded video.
#
# 8MB headroom = ~9 depth frames or ~27 IR frames per FIFO.
fs.pipe-max-size = 8388608
