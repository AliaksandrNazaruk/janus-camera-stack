# Standalone CI workflow for janus-camera-page.
# Used when this directory is extracted as its own repo. The monorepo
# already has a top-level .github/workflows/ci.yml that covers this service
# along with others.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff==0.15.0
      - run: ruff check app/

  test:
    name: Unit + fitness tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt pytest-cov
      - name: Run tests
        env:
          PYTHONPATH: ".:app"
          XARM_IP: "127.0.0.1"
          DEPTH_BASE_URL: "http://127.0.0.1:9999"
          INTERNAL_API_SECRET: "ci-test-secret"
          # Pin the LAN topology the security/CSP tests assert against, so the
          # suite is deterministic regardless of the runner's own IP.
          HOST_LAN_IP: "192.168.1.10"
          DEPTH_CAMERA_IP: "192.168.1.55"
          DEPTH_CAM_URL: "http://192.168.1.55:8900"
        run: |
          python -m pytest tests/ --ignore=tests/e2e \
            -m "not hardware and not simulator" \
            --timeout=30 \
            -q --tb=short \
            --cov=app \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=70

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: janus-camera-stack:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test — run the container, hit the control plane
        run: |
          docker run -d --name jcs -p 8900:8900 janus-camera-stack:ci
          for i in $(seq 1 30); do curl -fsS localhost:8900/livez && break; sleep 1; done
          echo
          curl -fsS localhost:8900/livez
          curl -fsS -o /dev/null -w "console.html -> %{http_code}\n" localhost:8900/console.html
          curl -fsS -o /dev/null -w "healthz -> %{http_code}\n" localhost:8900/healthz
          docker logs jcs | tail -5
          docker rm -f jcs

  helm:
    name: Helm chart lint + template
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v4
        with:
          version: "3.14.4"
      - name: Lint chart
        run: helm lint deploy/helm/janus-camera-stack/
      - name: Render templates (smoke test)
        run: |
          helm template ci-test deploy/helm/janus-camera-stack/ \
            --set secrets.turnSecret=ci-test \
            --set secrets.internalApiSecret=ci-test \
            --set secrets.janusAdminSecret=ci-test \
            --set janus.publicIp=1.2.3.4 \
            > /tmp/rendered.yaml
          wc -l /tmp/rendered.yaml
          grep -c "^kind:" /tmp/rendered.yaml
