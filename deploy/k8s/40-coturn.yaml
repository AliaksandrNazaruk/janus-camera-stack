# coturn — TURN/STUN relay for clients behind symmetric NAT.
# hostNetwork=true required: TURN relay opens random UDP ports on REAL IP,
# k8s Service can't proxy a UDP port range.
#
# Operator pins coturn to node(s) with public IP via nodeSelector.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: coturn
  namespace: janus-camera-stack
  labels:
    app: coturn
    component: turn-relay
spec:
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
        component: turn-relay
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        node-role.cloud.janus/turn: "true"
      containers:
        - name: coturn
          image: coturn/coturn:4.6
          imagePullPolicy: IfNotPresent
          args:
            - "-n"
            - "--log-file=stdout"
            - "--listening-port=3478"
            - "--tls-listening-port=5349"
            - "--use-auth-secret"
            - "--static-auth-secret=$(TURN_SECRET)"
            - "--realm=$(TURN_REALM)"
            - "--no-cli"
            - "--no-multicast-peers"
            - "--min-port=49152"
            - "--max-port=49999"
          env:
            - name: TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: camera-page-secrets
                  key: TURN_SECRET
            - name: TURN_REALM
              valueFrom:
                configMapKeyRef:
                  name: camera-page-config
                  key: TURN_REALM
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
