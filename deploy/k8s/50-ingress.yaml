# Ingress: TLS termination + path-based routing to camera-page.
# Assumes cert-manager or operator-provided TLS Secret.
#
# WebRTC requires HTTPS (browser refuses getUserMedia/PeerConnection on plain HTTP).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: camera-page
  namespace: janus-camera-stack
  annotations:
    # cert-manager auto-issue (optional)
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"   # SSE long-lived
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cameras.example.com
      secretName: cameras-tls
  rules:
    - host: cameras.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: camera-page
                port:
                  name: http
