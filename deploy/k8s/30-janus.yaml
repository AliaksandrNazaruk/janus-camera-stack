# Janus Gateway — runs with hostNetwork=true so WebRTC ICE candidates use the
# node's real IP. Pin to dedicated node via nodeSelector — node must have
# public IP (or be reachable through TURN).
#
# IMPORTANT: only ONE Janus instance per node — hostNetwork ports collide.
# Multi-replica deployment requires multiple labeled nodes.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: janus
  namespace: janus-camera-stack
  labels:
    app: janus
    component: webrtc-sfu
spec:
  serviceName: janus
  replicas: 1
  selector:
    matchLabels:
      app: janus
  template:
    metadata:
      labels:
        app: janus
        component: webrtc-sfu
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        node-role.cloud.janus/sfu: "true"
      containers:
        - name: janus
          image: canyan/janus-gateway:1.2.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
              name: http
            - containerPort: 8188
              name: ws
            - containerPort: 7088
              name: admin
          volumeMounts:
            - name: config
              mountPath: /usr/local/etc/janus
              readOnly: true
          livenessProbe:
            httpGet:
              host: 127.0.0.1
              path: /janus/info
              port: 8088
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: janus-config
---
# Janus jcfg ConfigMap. Operator overrides with their own to set the
# correct nat_1_1_mapping (public IP of the node).
apiVersion: v1
kind: ConfigMap
metadata:
  name: janus-config
  namespace: janus-camera-stack
data:
  janus.jcfg: |
    general: {
        configs_folder = "/usr/local/etc/janus"
        debug_level = 4
        admin_secret = "REPLACE_ME"
    }
    nat: {
        # Operator MUST set this to the node's public IP, otherwise ICE
        # candidates point to private overlay IP and remote clients can't connect.
        # nat_1_1_mapping = "203.0.113.42"
        stun_server = "stun.l.google.com"
        stun_port = 19302
        ice_lite = false
    }
    media: {
        rtp_port_range = "20000-40000"
    }
---
apiVersion: v1
kind: Service
metadata:
  name: janus
  namespace: janus-camera-stack
spec:
  type: ClusterIP
  clusterIP: None    # headless — pods reachable via DNS
  selector:
    app: janus
  ports:
    - name: http
      port: 8088
      targetPort: 8088
    - name: ws
      port: 8188
      targetPort: 8188
    - name: admin
      port: 7088
      targetPort: 7088
