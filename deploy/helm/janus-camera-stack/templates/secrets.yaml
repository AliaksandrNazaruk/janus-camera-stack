{{- if not .Values.secrets.existingSecret -}}
{{- if or .Values.secrets.turnSecret .Values.secrets.internalApiSecret .Values.secrets.janusAdminSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: camera-page-secrets
  namespace: {{ .Values.namespace }}
  labels: {{- include "stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  TURN_SECRET: {{ required "secrets.turnSecret required (use openssl rand -hex 32)" .Values.secrets.turnSecret | quote }}
  INTERNAL_API_SECRET: {{ required "secrets.internalApiSecret required" .Values.secrets.internalApiSecret | quote }}
  JANUS_ADMIN_SECRET: {{ required "secrets.janusAdminSecret required" .Values.secrets.janusAdminSecret | quote }}
{{- end -}}
{{- end -}}
