# Camera Stack — Alertmanager Rules
#
# Prometheus recording + alerting rules for SLO burn-rate monitoring.
# Drop into /etc/prometheus/rules/ or reference from prometheus.yml:
#   rule_files: ["camstack-alert-rules.yml"]

groups:
  # ── Recording rules (precomputed for burn-rate) ───────────────────
  - name: camstack.recording
    interval: 30s
    rules:
      # Stream availability over various windows
      - record: camstack:stream_availability:5m
        expr: avg_over_time(camstack_stream_active[5m])

      - record: camstack:stream_availability:1h
        expr: avg_over_time(camstack_stream_active[1h])

      - record: camstack:stream_availability:6h
        expr: avg_over_time(camstack_stream_active[6h])

      # Watchdog health ratio
      - record: camstack:watchdog_health_ratio:5m
        expr: >
          rate(camstack_watchdog_healthy_total[5m])
          / rate(camstack_watchdog_checks_total[5m])

      # TTFF p95
      - record: camstack:ttff_p95:5m
        expr: histogram_quantile(0.95, rate(camstack_ttff_seconds_bucket[5m]))

      # ICE connect p95
      - record: camstack:ice_connect_p95:5m
        expr: histogram_quantile(0.95, rate(camstack_ice_connect_duration_seconds_bucket[5m]))

  # ── Alerting rules ────────────────────────────────────────────────
  - name: camstack.alerts
    rules:
      # ── Stream health ─────────────────────────────────────────────

      - alert: CamstackStreamUnhealthy
        expr: camstack_stream_active == 0
        for: 2m
        labels:
          severity: critical
          service: camera_stack
        annotations:
          summary: "Camera stream is down"
          description: >
            camstack_stream_active has been 0 for >2 min on {{ $labels.instance }}.
            Check Janus, ffmpeg pipeline, and RealSense mux.

      - alert: CamstackJanusUnreachable
        expr: camstack_janus_reachable == 0
        for: 1m
        labels:
          severity: critical
          service: camera_stack
        annotations:
          summary: "Janus gateway unreachable"
          description: >
            Janus REST API has been unreachable for >1 min on {{ $labels.instance }}.
            FDIR should escalate to L2 (restart Janus).

      - alert: CamstackVideoStale
        expr: camstack_video_age_ms > 10000
        for: 1m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "Video frame age exceeds 10s (matches watchdog_stale_ms)"
          description: >
            Last video frame on mountpoint is {{ $value }}ms old on {{ $labels.instance }}.
            Pipeline may be stalled.

      # ── FDIR escalation ───────────────────────────────────────────

      - alert: CamstackRecoveryLadderHigh
        expr: camstack_recovery_ladder_level >= 3
        for: 30s
        labels:
          severity: critical
          service: camera_stack
        annotations:
          summary: "Recovery ladder at level {{ $value }} (USB reset or reboot)"
          description: >
            FDIR has escalated to level {{ $value }} on {{ $labels.instance }}.
            L3=USB reset, L4=reboot. Investigate root cause.

      - alert: CamstackModeDegraded
        expr: camstack_system_mode >= 1
        for: 5m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "System in degraded/local-only/safe mode"
          description: >
            System mode is {{ $value }} (1=DEGRADED, 2=LOCAL_ONLY, 3=SAFE)
            on {{ $labels.instance }} for >5 min.

      - alert: CamstackModeSafe
        expr: camstack_system_mode == 3
        for: 30s
        labels:
          severity: critical
          service: camera_stack
        annotations:
          summary: "System entered SAFE mode"
          description: >
            FDIR has put {{ $labels.instance }} into SAFE mode.
            All streaming halted. Manual intervention required.

      # ── Client telemetry ──────────────────────────────────────────

      - alert: CamstackNoClientTelemetry
        expr: camstack_client_last_report_age_seconds > 120
        for: 5m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "No client telemetry for >2 min"
          description: >
            Last stats_report from a browser client was {{ $value }}s ago
            on {{ $labels.instance }}. May indicate no viewers or JS error.

      - alert: CamstackHighPacketLoss
        expr: camstack_client_packet_loss_ratio > 0.01
        for: 3m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "Client packet loss > 1%"
          description: >
            Packet loss ratio is {{ $value | humanizePercentage }}
            on {{ $labels.instance }}. SLO threshold is 1%.
            Check TURN relay, network conditions, or bitrate.

      # ── SLO / TTFF regression ─────────────────────────────────────

      - alert: CamstackTTFFRegression
        expr: camstack:ttff_p95:5m > 8
        for: 10m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "TTFF p95 exceeds 8s SLO"
          description: >
            Time-to-first-frame p95 is {{ $value }}s on {{ $labels.instance }},
            above the 8s SLO threshold. Investigate ICE/DTLS/codec setup.

      - alert: CamstackICEConnectSlow
        expr: camstack:ice_connect_p95:5m > 5
        for: 10m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "ICE connect p95 exceeds 5s SLO"
          description: >
            ICE connection time p95 is {{ $value }}s on {{ $labels.instance }},
            above the 5s SLO threshold. Check TURN/STUN availability.

      # ── Reconnect storm ───────────────────────────────────────────

      - alert: CamstackReconnectStorm
        expr: rate(camstack_ice_connects_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "High ICE reconnect rate (>6/min)"
          description: >
            ICE connection rate is {{ $value }}/s on {{ $labels.instance }}.
            Clients may be in a reconnect loop. Check network stability.

      # ── Burn-rate (multi-window) ──────────────────────────────────

      - alert: CamstackAvailabilityBurnRateFast
        expr: >
          (1 - camstack:stream_availability:5m) > (14.4 * (1 - 0.99))
        for: 2m
        labels:
          severity: critical
          service: camera_stack
          window: fast
        annotations:
          summary: "Fast burn: availability dropping 14.4× error budget"
          description: >
            5-min stream availability is {{ $value | humanizePercentage }}
            on {{ $labels.instance }}. At this rate, the monthly 99% SLO
            error budget will be consumed in ~5 hours.

      - alert: CamstackAvailabilityBurnRateSlow
        expr: >
          (1 - camstack:stream_availability:1h) > (6 * (1 - 0.99))
        for: 15m
        labels:
          severity: warning
          service: camera_stack
          window: slow
        annotations:
          summary: "Slow burn: availability eroding error budget 6×"
          description: >
            1-hour stream availability is {{ $value | humanizePercentage }}
            on {{ $labels.instance }}. Monthly error budget will deplete
            in ~5 days at this rate.

      # ── Thermal ───────────────────────────────────────────────────

      - alert: CamstackCPUHot
        expr: camstack_cpu_temp_celsius > 68
        for: 2m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "RPi5 CPU temperature > 68°C (throttle at ~70°C)"
          description: >
            CPU temperature is {{ $value }}°C on {{ $labels.instance }}.
            Thermal throttling likely active. Check cooling.

      # ── Admin bruteforce ───────────────────────────────────────────

      - alert: CamstackAdminBruteforce
        expr: rate(camstack_admin_rate_limit_exceeded_total[5m]) > 0.15
        for: 1m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "Admin endpoint bruteforce attempt (>9 429s/min)"
          description: >
            Admin rate-limit 429 rate is {{ $value }}/s on {{ $labels.instance }}.
            Possible token bruteforce. Check access logs.

      # ── Reboot circuit breaker ──────────────────────────────────────

      - alert: CamstackRebootCircuitBreaker
        expr: camstack_recovery_ladder_level >= 4
        for: 10s
        labels:
          severity: critical
          service: camera_stack
        annotations:
          summary: "FDIR reached reboot level — circuit breaker may trip"
          description: >
            Recovery ladder at level {{ $value }} (reboot) on {{ $labels.instance }}.
            If max_fdir_reboots exceeded, system enters SAFE mode.
            Immediate investigation required.

      # ── Watchdog stall ────────────────────────────────────────────

      - alert: CamstackWatchdogStalled
        expr: rate(camstack_watchdog_checks_total[5m]) == 0
        for: 3m
        labels:
          severity: critical
          service: camera_stack
        annotations:
          summary: "Watchdog has stopped running"
          description: >
            No watchdog check cycles in 5 min on {{ $labels.instance }}.
            The FDIR subsystem may have crashed.

      # ── WebSocket connection flood ──────────────────────────────────

      - alert: CamstackWSConnectionsHigh
        expr: camstack_ws_connections_active > 8
        for: 1m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "High number of active WebSocket connections"
          description: >
            {{ $value }} active WS connections on {{ $labels.instance }}.
            May indicate a connection leak or DoS attempt.

      # ── Janus summary parse errors ─────────────────────────────────

      - alert: CamstackJanusSummaryParseErrors
        expr: rate(camstack_janus_summary_parse_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "Janus summary response parse errors detected"
          description: >
            Janus REST API returning unexpected response format on
            {{ $labels.instance }}. May indicate Janus version mismatch.

      # ── Depth proxy errors ─────────────────────────────────────────

      - alert: CamstackDepthProxyErrors
        expr: rate(camstack_depth_proxy_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: camera_stack
        annotations:
          summary: "Depth camera proxy errors"
          description: >
            Sustained depth proxy errors on {{ $labels.instance }}.
            Check connectivity between color and depth nodes.

  - name: camstack-audit-remediation
    rules:
      - alert: CamstackICESetupFailures
        expr: rate(camstack_ice_setup_failures_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "ICE setup failures detected"
          description: "ICE connection setup is failing — clients cannot establish WebRTC media path."

      - alert: CamstackDTLSFailures
        expr: rate(camstack_dtls_handshake_failures_total[5m]) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DTLS handshake failures detected (>1/min)"
          description: "DTLS handshake failures indicate potential TLS/crypto issues in the media path."

      - alert: CamstackOrphanedSessions
        expr: rate(camstack_orphaned_janus_sessions_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Orphaned Janus sessions accumulating"
          description: "Janus sessions are not being cleanly destroyed — potential resource leak."

      - alert: CamstackProcessMemoryHigh
        expr: camstack_process_memory_bytes > 512 * 1024 * 1024
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Camera service RSS > 512MB"
          description: "Process memory is elevated — investigate for leaks."

      - alert: CamstackRecoveryActionSlow
        expr: histogram_quantile(0.95, rate(camstack_recovery_action_duration_seconds_bucket[15m])) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "FDIR recovery actions taking > 60s at p95"
          description: "Recovery actions are slow — pipeline restarts or Janus restarts may be hanging."

      - alert: CamstackServiceRestartLoop
        expr: rate(camstack_watchdog_escalations_total{level="restart_pipeline"}[10m]) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pipeline restart loop detected"
          description: "Pipeline restarts happening > 3/10min — likely a persistent failure."
